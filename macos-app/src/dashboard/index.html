<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!--
    Yapflow metrics dashboard. A separate, occasionally-opened window (NOT
    part of the always-running tray surface — see CLAUDE.md "keep the
    always-running surface area minimal"). Deliberately self-contained: no
    CDN, no external chart library, no network — charts are hand-drawn inline
    SVG in dashboard.js — to stay consistent with the project's zero-cloud,
    no-telemetry ethos. Data arrives via the `metrics:get` IPC (see
    preload.js / ../lib/metrics.js).
  -->
  <title>Yapflow — Metrics</title>
  <style>
    :root {
      --bg: #11131a; --panel: #1a1d28; --ink: #e7eaf2; --muted: #8b92a6;
      --accent: #6ea8fe; --good: #5fd08a; --warn: #f0b95b; --line: #2a2e3c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 28px 32px 48px;
    }
    h1 { font-size: 20px; margin: 0 0 2px; }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 26px; font-weight: 600; margin-top: 6px; }
    .card .value small { font-size: 14px; color: var(--muted); font-weight: 400; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
    .panel h2 { font-size: 14px; margin: 0 0 14px; color: var(--ink); font-weight: 600; }
    .panel .hint { color: var(--muted); font-size: 12px; margin: -8px 0 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 500; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .bar-row { display: grid; grid-template-columns: 150px 1fr 64px; align-items: center; gap: 10px; margin: 7px 0; }
    .bar-track { background: #0d0f15; border-radius: 6px; height: 14px; overflow: hidden; }
    .bar-fill { background: var(--accent); height: 100%; }
    .bar-val { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); padding: 40px 0; text-align: center; }
    svg text { fill: var(--muted); font-size: 10px; }
    .reload { float: right; background: #232838; color: var(--ink); border: 1px solid var(--line);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
    .reload:hover { background: #2b3146; }
  </style>
</head>
<body>
  <button class="reload" id="reload">Refresh</button>
  <h1>Yapflow metrics</h1>
  <p class="sub">Your own trendlines — is dictation getting faster, and is it learning your words?</p>
  <div id="root"><p class="empty">Loading…</p></div>
  <script src="dashboard.js"></script>
</body>
</html>
